lazar2021accelerating:
  label: Lead platform engineering contribution
  summary: Co-conceived the FlyBrainLab architecture and developed the platform, user-side and utility libraries, validation workflows, visualizations, and comparative circuit models.
  source: https://elifesciences.org/articles/62362
  display_authors:
    - Mehmet Kerem Turkcan
    - Aurel A. Lazar
    - Tingkai Liu
    - Yiyin Zhou

lazar2022programmable:
  label: Lead software contribution
  summary: Developed NeuroNLP++ and the FeedbackCircuits library, and evaluated the antennal-lobe feedback circuit; the paper explicitly states that its published author list is alphabetical.
  source: https://www.frontiersin.org/journals/neuroinformatics/articles/10.3389/fninf.2022.853098/full
  display_authors:
    - Mehmet Kerem Turkcan
    - Aurel A. Lazar
    - Yiyin Zhou
