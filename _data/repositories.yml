  - name: GPTune
    github: https://github.com/mkturkcan/GPTune
    description: Early GPT-2 fine-tuning and sampling toolkit for adapting the 774M-parameter model on a single GPU.
    tags: [GPT-2, Fine Tuning, CLI]
  - name: FlyBrainLab
    github: https://github.com/FlyBrainLab/FlyBrainLab
