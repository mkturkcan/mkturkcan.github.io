profile: mkturkcan

repositories:
  - name: DART
    github: https://github.com/mkturkcan/DART
    huggingface: https://huggingface.co/mehmetkeremturkcan/DART
    description: Real-time open-vocabulary detection using shared frontier-model backbones, batched decoding, distillation, and TensorRT.
    tags: [PyTorch, TensorRT, Open Vocabulary]
  - name: UrbanOmniDetect
    github: https://github.com/mkturkcan/urbanomnidetect
    huggingface: https://huggingface.co/mehmetkeremturkcan/UrbanOmniDetect
    description: Calibration-free monocular 3D detection across ego-vehicle, infrastructure, and aerial viewpoints.
    tags: [Monocular 3D, V2X, CVPR 2026]
  - name: Loom
    github: https://github.com/mkturkcan/Loom
    huggingface: https://huggingface.co/mehmetkeremturkcan/Loom
    description: Analytical looped-transformer computer with C compilation, ONNX/WebGPU demos, FPGA verification, and regression tests.
    tags: [Transformers, ONNX, WebGPU]
  - name: bikeped
    github: https://github.com/mkturkcan/bikeped
    huggingface: https://huggingface.co/datasets/mehmetkeremturkcan/bikeped
    description: Real-time fisheye perception, safety alerts, simulator scenarios, and conformance testing for urban intersections.
